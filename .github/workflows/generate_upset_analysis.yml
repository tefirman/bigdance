name: Generate Upset Analysis Data

on:
  workflow_dispatch:
    inputs:
      use_espn:
        description: "Use real ESPN bracket (run after Selection Sunday)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      base_observations:
        description: "Total bracket observations to simulate (higher = more accurate, slower)"
        required: false
        default: "1000"
        type: string
      gender:
        description: "Which tournament(s) to generate data for"
        required: false
        default: "both"
        type: choice
        options:
          - "both"
          - "men"
          - "women"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pool_size: [10, 15, 20, 30, 50, 75, 100, 150, 200]
        gender: ${{ inputs.gender == 'both' && fromJSON('["men", "women"]') || fromJSON(format('["{0}"]', inputs.gender)) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run analysis for ${{ matrix.gender }} pool size ${{ matrix.pool_size }}
        run: |
          ARGS="--pool_size ${{ matrix.pool_size }} --base_observations ${{ inputs.base_observations }} --gender ${{ matrix.gender }}"
          if [ "${{ inputs.use_espn }}" = "true" ]; then
            ARGS="$ARGS --use_espn"
          fi
          python app/generate_upset_analysis.py $ARGS

      - name: Upload pool_${{ matrix.pool_size }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.gender }}-pool-${{ matrix.pool_size }}
          path: app/data/${{ matrix.gender }}/pool_${{ matrix.pool_size }}/

  commit:
    needs: generate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: app/data/
          merge-multiple: false

      - name: Move artifacts into correct pool subdirectories
        run: |
          for gender in men women; do
            for pool_size in 5 10 15 20 30 50; do
              src="app/data/${gender}-pool-${pool_size}"
              dst="app/data/${gender}/pool_${pool_size}"
              if [ -d "$src" ]; then
                mkdir -p "$dst"
                cp -r "$src"/. "$dst/"
                rm -rf "$src"
              fi
            done
          done

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            GENDER="${{ inputs.gender }}"
            ESPN_FLAG="${{ inputs.use_espn }}"
            if [ "$ESPN_FLAG" = "true" ]; then
              MSG="Update ${GENDER} upset analysis data from ESPN bracket"
            else
              MSG="Update ${GENDER} upset analysis data from Warren Nolan standings"
            fi
            git commit -m "$MSG [skip ci]"
            git push
          fi
